name: Build, Test and Push

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Build the image into the local Docker daemon (not pushed),
      # tagged as kylemanna/openvpn because the test scripts hardcode that name.
      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: kylemanna/openvpn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # OpenVPN needs the tun device; make sure it's available on the runner.
      - name: Enable TUN device
        run: |
          sudo modprobe tun
          sudo mkdir -p /dev/net
          [ -c /dev/net/tun ] || sudo mknod /dev/net/tun c 10 200

      - name: Run test suite
        run: |
          chmod +x test/run.sh test/tests/*/run.sh
          test/run.sh kylemanna/openvpn:latest

  docker:
    runs-on: ubuntu-latest
    needs: test          # <-- push only happens if tests pass
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: yukifolf/docker-openvpn
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
