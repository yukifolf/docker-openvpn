name: Test

on:
  pull_request:
    branches: [master]
  workflow_call:        # lets release.yml invoke this job
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      # Build the image into the local Docker daemon (not pushed),
      # tagged as kylemanna/openvpn because the test scripts hardcode that name.
      # Single-platform only: `load: true` can't load a multi-arch manifest.
      - name: Build image for testing
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: kylemanna/openvpn:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # OpenVPN needs the tun device; make sure it's available on the runner.
      - name: Enable TUN device
        run: |
          sudo modprobe tun
          sudo mkdir -p /dev/net
          [ -c /dev/net/tun ] || sudo mknod /dev/net/tun c 10 200
      - name: Run test suite
        run: |
          chmod +x test/run.sh test/tests/*/run.sh
          test/run.sh kylemanna/openvpn:latest
